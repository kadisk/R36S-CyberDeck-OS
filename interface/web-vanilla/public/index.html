<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=640, height=480, initial-scale=1" />
  <title>R36S CyberDeck OS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 640x480, kiosk. Conteúdo das abas é montado por JS (js/views.js).
       Navegação: D-pad (abas ←→ / foco ↑↓), A = ok, B = voltar.
       Analógico ESQ = cursor virtual, DIR = scroll. Dados via cyberdeck-agent. -->

  <header id="topbar">
    <span class="brand">R36S//CYBERDECK</span>
    <span class="brand-ui" id="tb-uikind">WEB</span>
    <span class="tb" id="tb-host">host —</span>
    <span class="spacer"></span>
    <span class="tb" id="tb-net">NET —</span>
    <span class="tb" id="tb-temp">—°C</span>
    <span class="tb" id="tb-bat">BAT —</span>
    <span class="tb" id="tb-clock">--:--:--</span>
  </header>

  <nav id="tabs" aria-label="Seções"><!-- abas montadas por JS --></nav>

  <main id="content"><!-- views montadas por JS --></main>

  <footer id="hints">
    <span id="hint-keys">A: ok · B: voltar · ←→: abas · ↑↓: foco</span>
    <span class="spacer"></span>
    <span class="tb" id="agent-state">agente: …</span>
    <span class="tb" id="lastkey">tecla: —</span>
  </footer>

  <!-- modal de confirmação (ações perigosas) -->
  <div id="confirm" class="overlay" hidden>
    <div class="confirm-box">
      <h3>CONFIRMAR AÇÃO</h3>
      <p id="confirm-msg">—</p>
      <div class="confirm-keys"><b class="btn btn-a">A</b> confirmar &nbsp;·&nbsp; <b class="btn btn-b">B</b> cancelar</div>
    </div>
  </div>

  <!-- menu FUNCTION (botão FN): AJUSTES, POWER, auto screenshot -->
  <div id="fnmenu" class="overlay" hidden>
    <div class="fn-box">
      <h3>FUNCTION</h3>
      <div id="fn-list"></div>
      <div class="fn-foot"><span id="fn-ver">CyberDeck</span> · <b class="btn btn-b">B</b>/<b class="btn btn-o">FN</b> fecha</div>
    </div>
  </div>

  <!-- toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/history.js"></script>
  <script src="js/views.js"></script>
  <script src="js/gamepad.js"></script>
  <script src="app.js"></script>
</body>
</html>
