odroidgoa-uboot-config

########################################################################
# R36S CyberDeck OS — boot.ini de TESTE (Fase 2, boot mínimo)
#
# Baseado no boot.ini funcional do ArkOS, mas:
#   - SEM "quiet"   (queremos ver o log do kernel)
#   - SEM "splash"  / sem plymouth
#   - mantém console=/dev/ttyFIQ0, fbcon=rotate:0, consoleblank=0
#   - root aponta para o ROOTFS EXPERIMENTAL do CyberDeck (por UUID), não o ArkOS
#   - init=/sbin/init explícito (busybox), rootfstype=ext4
#
# Carrega kernel/initrd/dtb da partição BOOT (mmc 1:1), iguais aos do ArkOS.
# A UUID abaixo precisa casar com a da partição rootfs gerada
# (scripts/phase2-config.sh: R36S_ROOTFS_UUID).
########################################################################

# Boot Arguments
# console=tty1 ADICIONADO: faz o log do kernel aparecer NA TELA do R36S
# (sem cabo serial não dá p/ ver o ttyFIQ0). tty1 é o último console => /dev/console
# vira a tela, então banner e shell também saem na tela. Mantém ttyFIQ0 p/ quem
# tiver serial. Removidos quiet/splash; logs visíveis.
setenv bootargs "root=UUID=c1be7dec-0de0-4a17-9f3a-7e5b00c0de36 rootwait rootfstype=ext4 rw init=/sbin/init net.ifnames=0 fbcon=rotate:0 consoleblank=0 console=/dev/ttyFIQ0 console=tty1 loglevel=7"

# Booting
setenv loadaddr "0x02000000"
setenv initrd_loadaddr "0x01100000"
setenv dtb_loadaddr "0x01f00000"

load mmc 1:1 ${loadaddr} Image
load mmc 1:1 ${initrd_loadaddr} uInitrd

load mmc 1:1 ${dtb_loadaddr} rk3326-r35s-linux.dtb

booti ${loadaddr} ${initrd_loadaddr} ${dtb_loadaddr}
